<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація користувача</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-body">

    <header class="page-header">
        <h1 class="header-title">Реєстрація у системі</h1>
    </header>

    <main class="page-main">
        <section class="form-section">
            <h2 class="section-title">Створити новий аккаунт</h2>
            
            <form id="registrationForm" class="registration-form" novalidate>
                
                <div class="form-group">
                    <label for="username" class="form-label">Ім'я користувача:</label>
                    <input type="text" id="username" class="form-input" placeholder="Введіть ім'я">
                    <span class="error-message" id="usernameError"></span>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Електронна пошта:</label>
                    <input type="email" id="email" class="form-input" placeholder="example@mail.com">
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Пароль (мін. 6 символів):</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••">
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Підтвердження пароля:</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="••••••••">
                    <span class="error-message" id="confirmPasswordError"></span>
                </div>

                <div class="form-group">
                    <label for="role" class="form-label">Ваша роль:</label>
                    <select id="role" class="form-select">
                        <option value="developer">Розробник</option>
                        <option value="designer">Дизайнер</option>
                        <option value="manager">Менеджер</option>
                    </select>
                </div>

                <button type="submit" class="submit-btn">Зареєструватися</button>
                
                <div class="success-message" id="successMessage"></div>
            </form>
        </section>
    </main>

    <footer class="page-footer">
        <p class="footer-text">&copy; 2026 Тестове завдання. Усі права захищено.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
